name: Trigger auto deployment for safety-mcp1

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/safety-mcp1-AutoDeployTrigger-468b7466-699f-4a17-9738-e2d3e67a245a.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SAFETYMCP1_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SAFETYMCP1_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SAFETYMCP1_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy container image
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile

          registryUrl: ${{ secrets.SAFETYMCP_REGISTRY_URL }}
          registryUsername: ${{ secrets.SAFETYMCP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SAFETYMCP_REGISTRY_PASSWORD }}

          containerAppName: safety-mcp1
          resourceGroup: mira_dev

          imageToBuild: ${{ secrets.SAFETYMCP_REGISTRY_URL }}/safety-mcp:${{ github.sha }}

          targetPort: 8000
          ingress: external